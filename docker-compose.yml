version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - files:/files
    environment:
      - SPRING_PROFILES_ACTIVE=default
    depends_on:
      - db

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: cloudstorage
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
  files:
